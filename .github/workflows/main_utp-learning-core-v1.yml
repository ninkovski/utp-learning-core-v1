name: Build and deploy Node.js app to Azure Web App - utp-learning-core-v1

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
      DATABASE_URL: file:./dev.db
      APP_VERSION: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Stamp production version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = require('./package.json');
          pkg.version = `${pkg.version}-main.${process.env.GITHUB_RUN_NUMBER}`;
          fs.writeFileSync('./package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -R dist deploy/dist
          cp package.json deploy/dist/package.json
          cp -R prisma deploy/prisma
          cp -R node_modules deploy/node_modules
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_WEBAPP_NAME: utp-learning-core-v1
      AZURE_RESOURCE_GROUP: utp-learning-core-v1_group

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy-package

      - name: Verify deploy package
        run: |
          ls -la deploy-package
          test -f deploy-package/package.json
          test -d deploy-package/dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_13F1C4655504464FAD482C966904E04E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8F8E7A7FAF104E0B855542C1A67E4352 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CAD1AF8D5C874B2EA201EF35BA78F76F }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'utp-learning-core-v1'
          slot-name: 'Production'
          package: deploy-package

      - name: Configure Azure runtime settings
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name "$AZURE_WEBAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --settings NODE_ENV=production DATABASE_URL=file:/home/site/data/dev.db

            az webapp config set \
              --name "$AZURE_WEBAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --startup-file "npm start" \
              --always-on true

            az webapp config set \
              --name "$AZURE_WEBAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --generic-configurations '{"healthCheckPath":"/api/health"}'

      - name: Restart Azure Web App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp restart --name "$AZURE_WEBAPP_NAME" --resource-group "$AZURE_RESOURCE_GROUP"
