name: Azure Deploy (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations (CI)
        run: npm exec prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Stamp production version
        run: |
          node -e "const fs=require('fs');const pkg=require('./package.json');pkg.version=`${pkg.version}-main.${process.env.GITHUB_RUN_NUMBER}`;fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2)+'\n');"
          echo "APP_VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_ENV

      - name: Install production dependencies only
        run: npm prune --omit=dev

      - name: Create deployment package folder
        run: |
          mkdir -p deploy
          cp -R dist deploy/dist
          cp -R prisma deploy/prisma
          cp -R node_modules deploy/node_modules
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy
